# Her Game, Her Voice — Hostinger VPS / Docker Manager deployment.
#
# This pulls a prebuilt PUBLIC image from GHCR (published by CI on every push to
# main) — it does NOT build locally. Start with:
#   docker compose up -d
#
# The app is stateless: no database, cache, or queue. It only reads an external
# podcast RSS feed at runtime via PODCAST_RSS_URL (see .env.example).
name: her-game-her-voice

services:
  web:
    image: ghcr.io/lifestack-studio/her-game-her-voice:latest
    # Always fetch the newest published image on `up`/`pull`.
    pull_policy: always
    container_name: her-game-her-voice-web
    restart: unless-stopped
    ports:
      # host:container — change the left side if 3000 is taken on the VPS.
      - "3000:3000"
    environment:
      NODE_ENV: production
      # The server binds 0.0.0.0:$PORT so it is reachable from outside the container.
      PORT: "3000"
      HOST: "0.0.0.0"
      # Powers /api/podcast/latest. Set in a .env file next to this compose file
      # (copy .env.example) or as a Docker Manager environment variable. Left
      # empty, the endpoint returns 503 but the site still runs.
      PODCAST_RSS_URL: "${PODCAST_RSS_URL:-}"
