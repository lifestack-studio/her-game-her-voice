services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: her-game-her-voice:latest
    container_name: hghv-web
    restart: unless-stopped
    ports:
      # host:container — change the left side if 3000 is taken on your VPS
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      # ---- Podcast RSS (powers /api/podcast/latest) ----
      # Set this in a .env file next to this compose file (NOT committed):
      #   PODCAST_RSS_URL=https://your-feed-url/rss
      PODCAST_RSS_URL: ${PODCAST_RSS_URL:-}
